<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自媒体工作台原型</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">自</span><div><strong>自媒体工作台</strong><small>本地创作中心</small></div></div>
      <button class="primary-btn new-project-btn" data-action="new-project">＋ 新建创作</button>
      <nav id="main-nav" class="main-nav" aria-label="主导航"></nav>
      <div class="sidebar-footer"><span class="online-dot"></span><span>本地数据已连接</span></div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div><h1 id="page-title">热点</h1><p id="page-subtitle">发现今天值得创作的内容</p></div>
        <div class="top-actions">
          <button class="icon-btn" data-action="toggle-theme" aria-label="切换主题">◐</button>
          <button class="avatar-btn">ME</button>
        </div>
      </header>
      <section id="page-content" class="page-content"></section>
    </main>
  </div>

  <div id="drawer-backdrop" class="backdrop hidden" data-action="close-drawer"></div>
  <aside id="drawer" class="drawer" aria-label="侧边抽屉"></aside>

  <div id="modal-backdrop" class="backdrop hidden" data-action="close-modal"></div>
  <section id="modal" class="modal hidden" role="dialog" aria-modal="true"></section>
  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>

  <script src="./app.js"></script>
</body>
</html>
